<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criminalidad Bogotá</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #e05c2a;
      --accent2: #f0a500;
      --text:    #e6edf3;
      --muted:   #8b949e;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 320px 1fr;
      grid-template-areas: "header header" "sidebar map";
    }
    header {
      grid-area: header;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing:.04em; text-transform:uppercase; }
    header span { margin-left: auto; font-size: .75rem; color: var(--muted); }
    #total-badge {
      background: var(--accent); color: #fff;
      font-size: .7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
    }
    aside {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .section { padding: 16px; border-bottom: 1px solid var(--border); }
    .section-title {
      font-size: .65rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    select, button {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 10px;
      font-size: .82rem; margin-bottom: 8px; cursor: pointer;
    }
    select:focus { outline: 1px solid var(--accent); }
    #btn-aplicar {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 600; margin-bottom: 4px;
      transition: opacity .15s;
    }
    #btn-aplicar:hover { opacity: .85; }
    #btn-reset { background: transparent; color: var(--muted); font-size: .75rem; margin-bottom: 0; }
    #btn-reset:hover { color: var(--text); }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .82rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row .label { color: var(--muted); }
    .stat-row .value { font-weight: 700; color: var(--accent2); }
    .bar-row { margin-bottom: 8px; }
    .bar-label { display:flex; justify-content:space-between; font-size:.75rem; margin-bottom:3px; color:var(--muted); }
    .bar-label span:last-child { color: var(--text); font-weight: 600; }
    .bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; font-size:.82rem; }
    .toggle { position:relative; width:36px; height:20px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:var(--border); border-radius:20px; cursor:pointer; transition:.2s; }
    .slider::before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    #map { grid-area: map; width:100%; height:100%; }
    .leaflet-popup-content-wrapper {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; font-size:.82rem;
    }
    .leaflet-popup-tip { background: var(--surface); }
    .popup-tipo { font-weight:700; color:var(--accent); margin-bottom:4px; }
    .popup-row { color: var(--muted); }
    .popup-row span { color: var(--text); }
    #loading {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; transition:opacity .3s;
    }
    #loading.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:36px; height:36px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<header>
  <div class="dot"></div>
  <h1>Mapa de Criminalidad — Bogotá</h1>
  <span id="total-badge">cargando...</span>
</header>

<aside>
  <div class="section">
    <div class="section-title">Filtros</div>
    <select id="sel-tipo"><option value="">Todos los delitos</option></select>
    <select id="sel-localidad"><option value="">Todas las localidades</option></select>
    <select id="sel-fecha-inicio"><option value="">Desde...</option></select>
    <select id="sel-fecha-fin"><option value="">Hasta...</option></select>
    <button id="btn-aplicar">Aplicar filtros</button>
    <button id="btn-reset">Limpiar filtros</button>
  </div>

  <div class="section">
    <div class="section-title">Capas</div>
    <div class="toggle-row">
      <span>Mostrar CAIs</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-cais" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Resumen</div>
    <div id="stats-resumen"></div>
  </div>

  <div class="section">
    <div class="section-title">Por tipo de delito</div>
    <div id="stats-tipo"></div>
  </div>

  <div class="section">
    <div class="section-title">Por localidad</div>
    <div id="stats-localidad"></div>
  </div>

  <div class="section">
    <div class="section-title">Por franja horaria</div>
    <div id="stats-hora"></div>
  </div>
</aside>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script>
  const API = "http://127.0.0.1:8000";

  const map = L.map("map").setView([4.6510, -74.0590], 11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19,
  }).addTo(map);

  let heatLayer = null;
  const caiMarkers    = L.layerGroup().addTo(map);
  const crimeMarkers  = L.layerGroup().addTo(map);

  const caiIcon = L.divIcon({
    html: `<div style="background:#1a7be0;border:2px solid #fff;width:12px;height:12px;border-radius:50%;box-shadow:0 0 6px #1a7be0;"></div>`,
    className: "", iconAnchor: [6, 6],
  });

  async function cargarOpciones() {
    const [tipos, localidades] = await Promise.all([
      fetch(`${API}/tipos-delito`).then(r => r.json()),
      fetch(`${API}/localidades`).then(r => r.json()),
    ]);
    const selTipo = document.getElementById("sel-tipo");
    tipos.forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; selTipo.appendChild(o); });
    const selLoc = document.getElementById("sel-localidad");
    localidades.forEach(l => { const o = document.createElement("option"); o.value = l; o.textContent = l; selLoc.appendChild(o); });
    const fechas = ["2024-01-01","2024-01-15","2024-02-01","2024-02-28","2024-03-01"];
    ["sel-fecha-inicio","sel-fecha-fin"].forEach(id => {
      const sel = document.getElementById(id);
      fechas.forEach(f => { const o = document.createElement("option"); o.value = f; o.textContent = f; sel.appendChild(o); });
    });
  }

  async function cargarHeatmap(params = {}) {
    const qs = new URLSearchParams(params).toString();
    const data = await fetch(`${API}/crimes/heatmap?${qs}`).then(r => r.json());
    if (heatLayer) map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(data, {
      radius: 35, blur: 25, maxZoom: 13,
      gradient: { 0.2:"#ffffb2", 0.5:"#fd8d3c", 0.8:"#e03c1a", 1.0:"#bd0026" },
    }).addTo(map);
    document.getElementById("total-badge").textContent = `${data.length} registros`;
  }

  async function cargarCrimes(params = {}) {
    const qs = new URLSearchParams(params).toString();
    const data = await fetch(`${API}/crimes?${qs}`).then(r => r.json());
    crimeMarkers.clearLayers();
    data.forEach(c => {
      const m = L.circleMarker([c.latitud, c.longitud], {
        radius:5, fillColor:"#e05c2a", color:"#fff", weight:1, fillOpacity:.7,
      });
      m.bindPopup(`
        <div class="popup-tipo">${c.tipo_delito}</div>
        <div class="popup-row">Localidad: <span>${c.localidad}</span></div>
        <div class="popup-row">Barrio: <span>${c.barrio || '—'}</span></div>
        <div class="popup-row">Fecha: <span>${c.fecha}</span></div>
        <div class="popup-row">Hora: <span>${c.hora}</span></div>
      `);
      crimeMarkers.addLayer(m);
    });
  }

  async function cargarCAIs() {
    const data = await fetch(`${API}/cais`).then(r => r.json());
    caiMarkers.clearLayers();
    data.forEach(c => {
      L.marker([c.latitud, c.longitud], { icon: caiIcon })
        .bindPopup(`<div class="popup-tipo">${c.nombre}</div><div class="popup-row">Localidad: <span>${c.localidad}</span></div>`)
        .addTo(caiMarkers);
    });
  }

  async function cargarStats() {
    const s = await fetch(`${API}/crimes/stats`).then(r => r.json());
    document.getElementById("stats-resumen").innerHTML = `
      <div class="stat-row"><span class="label">Total crímenes</span><span class="value">${s.total}</span></div>`;
    function barras(id, items) {
      const max = items[0]?.cantidad || 1;
      document.getElementById(id).innerHTML = items.map(i => {
        const pct = Math.round((i.cantidad / max) * 100);
        const lbl = i.tipo_delito || i.localidad || i.franja;
        return `<div class="bar-row">
          <div class="bar-label"><span>${lbl}</span><span>${i.cantidad}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join("");
    }
    barras("stats-tipo",      s.por_tipo);
    barras("stats-localidad", s.por_localidad);
    barras("stats-hora",      s.por_hora);
  }

  function getParams() {
    const p = {};
    const tipo = document.getElementById("sel-tipo").value;
    const loc  = document.getElementById("sel-localidad").value;
    const ini  = document.getElementById("sel-fecha-inicio").value;
    const fin  = document.getElementById("sel-fecha-fin").value;
    if (tipo) p.tipo_delito  = tipo;
    if (loc)  p.localidad    = loc;
    if (ini)  p.fecha_inicio = ini;
    if (fin)  p.fecha_fin    = fin;
    return p;
  }

  document.getElementById("btn-aplicar").addEventListener("click", () => {
    const p = getParams(); cargarHeatmap(p); cargarCrimes(p);
  });
  document.getElementById("btn-reset").addEventListener("click", () => {
    ["sel-tipo","sel-localidad","sel-fecha-inicio","sel-fecha-fin"].forEach(id => document.getElementById(id).value = "");
    cargarHeatmap(); cargarCrimes();
  });
  document.getElementById("toggle-cais").addEventListener("change", e => {
    e.target.checked ? map.addLayer(caiMarkers) : map.removeLayer(caiMarkers);
  });

  async function init() {
    await cargarOpciones();
    await Promise.all([cargarHeatmap(), cargarCrimes(), cargarCAIs(), cargarStats()]);
    document.getElementById("loading").classList.add("hidden");
  }
  init();
</script>
</body>
</html>
